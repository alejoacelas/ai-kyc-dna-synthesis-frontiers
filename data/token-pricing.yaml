claude:
  sonnet:
    input: 3.00    # Sonnet 4 / 4.5
    output: 15.00
  sonnet-long:
    input: 6.00    # Sonnet 4 / 4.5 with >200K input (1M ctx beta)
    output: 22.50
  default:
    input: -1.00
    output: -1.00

minimax:
  m2:
    input: 0.30    # MiniMax-M2
    output: 1.20
  default:
    input: -1.00
    output: -1.00

zhipu:
  glm-4.6:
    input: 0.60
    output: 2.20
  default:
    input: -1.00
    output: -1.00    # Default to GLM-4.6

gemini:
  gemini-2.5-pro:
    input: 1.25     # ≤200K prompt
    output: 10.00
  gemini-2.5-pro-long:
    input: 2.50     # >200K prompt
    output: 15.00
  default:
    input: -1.00
    output: -1.00

grok:
  grok-4:
    input: 3.00
    output: 15.00
  default:
    input: -1.00
    output: -1.00
